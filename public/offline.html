<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Overload Offline</title>
    <meta name="theme-color" content="#000000" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 420px);
        border: 1px solid #333;
        border-radius: 18px;
        background: #1a1a1a;
        padding: 24px;
      }
      p {
        color: #a0a0a0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Overload is offline</h1>
      <p>Your saved workout data needs a network connection. Reconnect and reopen the app to continue.</p>
    </main>
  </body>
</html>
